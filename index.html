    <script>
        // shared.js espone: LP.esc, LP.isExternal, LP.applyBackground, LP.normalizeSiteData
        // iconResolver.js espone: LP.renderIconHtml
        let lang = 'it';
        let _siteData = null;

        // Returns the translated value for `field` on `obj`, falling back to the base field.
        function getT(obj, field) {
            if (lang === 'en') {
                const v = obj[field + 'En'];
                if (v !== undefined && v !== '') return v;
            }
            return obj[field] ?? '';
        }

        function setLang(newLang) {
            lang = newLang;
            document.getElementById('html-root').lang = newLang;
            document.getElementById('btn-it').classList.toggle('active', lang === 'it');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            if (_siteData) renderSite(_siteData);
        }

        function renderLink(link) {
            const brandAttr = link.brand ? ` data-brand="${LP.esc(link.brand)}"` : '';
            const targetAttr = LP.isExternal(link.url) ? ' target="_blank" rel="noopener"' : '';
            return `<a href="${LP.esc(link.url)}" class="link"${brandAttr}${targetAttr}>` +
                   `<span class="link-content">${LP.renderIconHtml(link)} ${LP.esc(getT(link, 'label'))}</span>` +
                   `<i class="fa-solid fa-arrow-right link-arrow"></i></a>`;
        }

        function renderSection(sec) {
            const layoutClass = sec.layout === 'grid' ? 'links-grid' : 'links';
            const descText = getT(sec, 'description');
            const desc = descText ? `<p>${LP.esc(descText)}</p>` : '';
            return `<div class="section" data-accent="${LP.esc(sec.accent)}">` +
                   `<h2><i class="${LP.esc(sec.icon)}"></i> ${LP.esc(getT(sec, 'title'))}</h2>` +
                   desc +
                   `<div class="${layoutClass}">${sec.links.map(renderLink).join('')}</div>` +
                   `</div>`;
        }

        function renderSite(data) {
            LP._iconUid = 0;
            const p = data.profile;

            const socialHtml = p.social.map(s =>
                `<a href="${LP.esc(s.url)}"${LP.isExternal(s.url) ? ' target="_blank" rel="noopener"' : ''} aria-label="${LP.esc(getT(s, 'label'))}">` +
                `<i class="${LP.esc(s.icon)}"></i></a>`
            ).join('');

            const ps = p.photoStyle || {};
            const avatarClass = [
                'profile-avatar',
                'avatar-size-'  + (ps.size     || 'medium'),
                'avatar-shape-' + (ps.shape    || 'circle'),
                'avatar-ring-'  + (ps.ring     || 'animated'),
                'avatar-pos-'   + (ps.position || 'top')
            ].join(' ');

            document.getElementById('main-container').innerHTML =
                `<header>` +
                `<div class="${avatarClass}"><div class="avatar-ring"></div><div class="avatar-bg"></div>` +
                `<div class="avatar-inner"><img src="${LP.esc(p.photo)}" alt="${LP.esc(p.name)}"></div></div>` +
                `<h1>${LP.esc(p.name)}</h1>` +
                `<p class="subtitle">${LP.esc(getT(p, 'subtitle'))}</p>` +
                `<p class="tagline"></p>` +
                `<div class="social-icons">${socialHtml}</div>` +
                `</header>` +
                data.sections.map(renderSection).join('');

            // Start typewriter on tagline after DOM is updated
            const taglineEl = document.querySelector('.tagline');
            if (taglineEl) typewrite(taglineEl, getT(p, 'tagline'));

            const f = data.footer;
            document.getElementById('main-footer').innerHTML =
                `<div class="footer-separator"></div>` +
                `<p class="footer-brand">${LP.esc(f.brand)}</p>` +
                `<p class="footer-copy">&copy; ${LP.esc(f.year)} All rights reserved.</p>` +
                `<p class="footer-tagline">Built with HTML, CSS, and JavaScript.</p>`;

            // Scroll-triggered entrance animations
            const observer = new IntersectionObserver(entries => {
                entries.forEach((entry, i) => {
                    if (entry.isIntersecting) {
                        entry.target.style.animationDelay = `${i * 0.08}s`;
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.08 });

            document.querySelectorAll('.section').forEach(el => observer.observe(el));
        }

        // ===== TYPEWRITER =====
        let _twTimer = null;
        function typewrite(el, text) {
            if (_twTimer) clearInterval(_twTimer);
            el.textContent = '';
            el.style.opacity = '1';
            const cursor = document.createElement('span');
            cursor.className = 'tw-cursor';
            el.appendChild(cursor);
            let i = 0;
            _twTimer = setInterval(() => {
                if (i < text.length) {
                    cursor.insertAdjacentText('beforebegin', text[i++]);
                } else {
                    clearInterval(_twTimer);
                    setTimeout(() => { if (cursor.parentNode) cursor.remove(); }, 1800);
                }
            }, 38);
        }

        // ===== RIPPLE =====
        document.addEventListener('click', function(e) {
            const link = e.target.closest('.link');
            if (!link) return;
            const rect = link.getBoundingClientRect();
            const r = document.createElement('span');
            r.className = 'ripple';
            r.style.cssText = `left:${e.clientX - rect.left}px;top:${e.clientY - rect.top}px`;
            link.appendChild(r);
            r.addEventListener('animationend', () => r.remove(), { once: true });
        });

        // ===== BOOT =====
        document.addEventListener('DOMContentLoaded', () => {
            _siteData = JSON.parse(document.getElementById('__SITE_DATA__').textContent);
            LP.normalizeSiteData(_siteData);
            LP.applyBackground(_siteData);
            renderSite(_siteData);
            document.getElementById('btn-it').addEventListener('click', () => setLang('it'));
            document.getElementById('btn-en').addEventListener('click', () => setLang('en'));
        });
    </script>
